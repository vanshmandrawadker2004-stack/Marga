<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #080a0e;
    font-family: 'Inter', sans-serif;
  }

  /* Subtle grain texture */
  .grain {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  /* Very faint horizontal rule lines like graph paper */
  .lines {
    position: absolute;
    inset: 0;
    opacity: 0.035;
    background-image: linear-gradient(rgba(255,255,255,1) 1px, transparent 1px);
    background-size: 100% 72px;
  }

  .content {
    position: absolute;
    inset: 0;
    padding: 80px 88px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .brand-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .brand-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 7px 16px;
    border-radius: 2px;
  }

  .middle {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 0;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #00e5ff;
    margin-bottom: 40px;
  }

  .headline {
    font-size: 120px;
    font-weight: 200;
    line-height: 1.05;
    letter-spacing: 0.04em;
    color: #fff;
    margin-bottom: 0;
  }

  .headline .accent {
    color: #00e5ff;
  }

  .rule {
    width: 40px;
    height: 1px;
    background: rgba(0,229,255,0.6);
    margin: 56px 0 48px;
  }

  .body-text {
    font-size: 20px;
    font-weight: 300;
    line-height: 1.7;
    color: rgba(255,255,255,0.38);
    max-width: 540px;
    letter-spacing: 0.02em;
  }

  .bottom-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .cta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
  }

  .swipe {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.13);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .swipe-arrow {
    color: #00e5ff;
    font-size: 14px;
    opacity: 0.5;
  }
</style>
</head>
<body>

  <div class="grain"></div>
  <div class="lines"></div>

  <div class="content">
    <div class="brand-row">
      <div class="brand">Marga</div>
      <div class="brand-tag">Maharashtra · Western Ghats</div>
    </div>

    <div class="middle">
      <div class="eyebrow">— for riders, by riders</div>
      <div class="headline">
        Every road<br/>
        has a<br/>
        <span class="accent">story.</span>
      </div>
      <div class="rule"></div>
      <div class="body-text">Curated trails, ghats, and coastal routes — handpicked for the ride.</div>
    </div>

    <div class="bottom-row">
      <div class="cta">marga.app · coming soon</div>
      <div class="swipe">Swipe to see more <span class="swipe-arrow">→</span></div>
    </div>
  </div>

</body>
</html>
